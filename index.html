<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masjid Display</title>

<style>
body {
  margin: 0;
  background: #0b132b;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* TOP BAR */
#top {
  text-align: center;
  padding: 20px;
}

#time {
  font-size: 5rem;
}

#date {
  font-size: 1.5rem;
  opacity: 0.8;
}

/* COUNTDOWN */
#countdown {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#nextPrayer {
  font-size: 2rem;
  margin-bottom: 10px;
}

#timer {
  font-size: 6rem;
  color: #ffd166;
}

/* IQAMA */
#iqama {
  font-size: 2rem;
  margin-top: 15px;
  color: #06d6a0;
}

/* FLASH ANIMATION */
.flash {
  animation: flashAnim 1s infinite;
}

@keyframes flashAnim {
  0% { opacity: 1; color: #ff4d4d; }
  50% { opacity: 0.2; color: #ffffff; }
  100% { opacity: 1; color: #ff4d4d; }
}

/* PRAYER ROW */
#prayers {
  display: flex;
  justify-content: space-around;
  padding: 20px;
  background: #1c2541;
}

.prayer {
  width: 18%;
  padding: 15px;
  border-radius: 12px;
  background: #3a506b;
  text-align: center;
  transition: 0.3s;
}

.prayer.active {
  background: #ffd166;
  color: black;
  transform: scale(1.05);
}

.prayer h3 {
  margin: 0;
  font-size: 1.3rem;
}

.prayer p {
  font-size: 2rem;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="top">
  <div id="time"></div>
  <div id="date"></div>
</div>

<div id="countdown">
  <div id="nextPrayer">Loading...</div>
  <div id="timer">--:--:--</div>
  <div id="iqama">Iqama in --:--</div>
</div>

<div id="prayers">
  <div class="prayer" id="p_fajr"><h3>Fajr</h3><p id="fajr"></p></div>
  <div class="prayer" id="p_dhuhr"><h3>Dhuhr</h3><p id="dhuhr"></p></div>
  <div class="prayer" id="p_asr"><h3>Asr</h3><p id="asr"></p></div>
  <div class="prayer" id="p_maghrib"><h3>Maghrib</h3><p id="maghrib"></p></div>
  <div class="prayer" id="p_isha"><h3>Isha</h3><p id="isha"></p></div>
</div>

<!-- 🔊 Beep -->
<audio id="beep" preload="auto" playsinline></audio>

<script>
let prayerTimes = {};
let adhanPlayed = {};
let iqamaPlayed = {};
let adhanStartTime = {}; // track flashing start

function playBeep() {
  const beep = document.getElementById("beep");
  beep.currentTime = 0;
  beep.src = "https://www.soundjay.com/buttons/sounds/beep-07.mp3";
  beep.play().catch(() => {});
}

// IQAMA SETTINGS
const iqamaOffsets = {
  fajr: 20,
  dhuhr: 10,
  asr: 10,
  maghrib: 10,
  isha: 10
};

const fixedIqama = {
  fajr: "06:00",
  dhuhr: "13:30"
};

async function fetchTimes() {
  const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Jersey%20City&country=US&method=2");
  const data = await res.json();
  const t = data.data.timings;

  prayerTimes = {
    fajr: t.Fajr,
    dhuhr: t.Dhuhr,
    asr: t.Asr,
    maghrib: t.Maghrib,
    isha: t.Isha
  };

  for (let k in prayerTimes) {
    document.getElementById(k).innerText = prayerTimes[k];
  }
}

function toDate(time) {
  const [h, m] = time.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0);
  return d;
}

function format(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}

function getIqamaTime(name, adhanTime) {
  if (fixedIqama[name]) return toDate(fixedIqama[name]);
  return new Date(adhanTime.getTime() + iqamaOffsets[name] * 60000);
}

function updateClock() {
  const now = new Date();
  document.getElementById("time").innerText = now.toLocaleTimeString();
  document.getElementById("date").innerText = now.toDateString();
}

function updateDisplay() {
  if (!prayerTimes.fajr) return;

  const now = new Date();
  let nextName, nextTime;

  document.querySelectorAll(".prayer").forEach(p => p.classList.remove("active"));

  const entries = Object.entries(prayerTimes);

  for (let [name, time] of entries) {
    const t = toDate(time);
    const iqamaT = getIqamaTime(name, t);

    if (now >= t && now < iqamaT) {
      nextName = name;
      nextTime = t;
      break;
    }

    if (t > now && !nextName) {
      nextName = name;
      nextTime = t;
    }
  }

  if (!nextTime) {
    nextName = "fajr";
    nextTime = toDate(prayerTimes.fajr);
    nextTime.setDate(nextTime.getDate() + 1);
  }

  const adhanTime = nextTime;
  const iqamaTime = getIqamaTime(nextName, adhanTime);

  const diff = adhanTime - now;
  const iqamaDiff = iqamaTime - now;

  document.getElementById("p_" + nextName).classList.add("active");

  // 🔔 ADHAN
  if (Math.abs(diff) < 1000 && !adhanPlayed[nextName]) {
    playBeep();
    adhanPlayed[nextName] = true;
    adhanStartTime[nextName] = now.getTime();
  }

  // 🔔 IQAMA
  if (Math.abs(iqamaDiff) < 1000 && !iqamaPlayed[nextName]) {
    playBeep();
    iqamaPlayed[nextName] = true;
  }

  const nextEl = document.getElementById("nextPrayer");

  // 🔴 ADHAN FLASH (10 sec)
  if (adhanStartTime[nextName] && (now.getTime() - adhanStartTime[nextName]) < 10000) {
    nextEl.innerText = "ADHAN NOW";
    nextEl.classList.add("flash");
    document.getElementById("timer").innerText = "00:00:00";
    document.getElementById("iqama").innerText = "";
    return;
  } else {
    nextEl.classList.remove("flash");
  }

  // BEFORE ADHAN
  if (diff > 0) {
    nextEl.innerText = "Next Prayer: " + nextName.toUpperCase();
    document.getElementById("timer").innerText = format(diff);
    document.getElementById("iqama").innerText =
      "Iqama in " + format(iqamaDiff);
  }
  // AFTER ADHAN → IQAMA MODE
  else {
    nextEl.innerText = "IQAMA: " + nextName.toUpperCase();
    document.getElementById("timer").innerText = "00:00:00";

    if (iqamaDiff > 0) {
      document.getElementById("iqama").innerText =
        "Starts in " + format(iqamaDiff);
    } else {
      document.getElementById("iqama").innerText =
        "Iqama started";
    }
  }
}

fetchTimes();
setInterval(updateClock, 1000);
setInterval(updateDisplay, 1000);
</script>

</body>
</html>
